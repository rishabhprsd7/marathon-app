      --ink-2:      #0D1720;
      --ink-3:      #13202E;
      --line:       rgba(248,241,222,0.13);
      --line-warm:  rgba(245,160,40,0.40);
      --paper:      #F7F0DC;
      --paper-2:    #EDE0C4;
      --paper-mute: rgba(247,240,220,0.75);
      --paper-dim:  rgba(247,240,220,0.52);
      --paper-faint:rgba(247,240,220,0.30);
      --amber:      #F5A028;
      --amber-hot:  #FFBA4D;
      --amber-deep: #C97820;
      --amber-tint: rgba(245,160,40,0.18);
      --sage:       #5EC95A;
      --sage-deep:  #2E8F30;
      --rust:       #FF5A35;
      --bone:       #FBF5E6;
      --shadow-warm:0 1px 0 rgba(247,240,220,0.05) inset, 0 12px 28px -16px rgba(0,0,0,0.65), 0 1px 0 rgba(0,0,0,0.45);
    }

    *,*::before,*::after{ box-sizing:border-box; margin:0; padding:0; }
    html,body{ background:var(--ink); color:var(--paper); }
    html{ font-size:16px; -webkit-text-size-adjust:100%; }
    body{
      font-family:'Plus Jakarta Sans', system-ui, sans-serif;
      font-feature-settings:'ss01','cv11';
      letter-spacing:-0.005em;
      min-height:100vh;
      min-height:100svh;
      background:
        radial-gradient(1200px 600px at 50% -10%, rgba(245,160,40,0.16), transparent 60%),
        radial-gradient(900px 600px at 100% 100%, rgba(20,40,70,0.35), transparent 60%),
        var(--ink);
    }
    button{ cursor:pointer; font-family:inherit; color:inherit; }
    textarea{ font-family:'Plus Jakarta Sans', system-ui, sans-serif; }

    /* Paper-noise texture for tactile cards */
    .grain{
      position:relative;
      isolation:isolate;
    }
    .grain::before{
      content:"";
      position:absolute; inset:0;
      pointer-events:none;
      border-radius:inherit;
      opacity:0.35;
      mix-blend-mode:overlay;
      background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.95 0 0 0 0 0.91 0 0 0 0 0.82 0 0 0 0.5 0'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>");
    }
    .grain-dark::before{
      opacity:0.18;
      background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.05 0 0 0 0 0.08 0 0 0 0 0.12 0 0 0 0.45 0'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>");
    }

    /* Scrollbars */
    ::-webkit-scrollbar{ width:7px; height:7px; }
    ::-webkit-scrollbar-track{ background:transparent; }
    ::-webkit-scrollbar-thumb{ background:rgba(241,232,210,0.16); border-radius:4px; }

    /* Selection */
    ::selection{ background:var(--amber); color:var(--ink); }

    /* Sticky tabs */
    .tabbar{
      position:sticky; top:0; z-index:80;
      backdrop-filter:saturate(140%) blur(14px);
      -webkit-backdrop-filter:saturate(140%) blur(14px);
      background:linear-gradient(180deg, rgba(12,20,28,0.92), rgba(12,20,28,0.82));
      border-bottom:1px solid var(--line);
    }

    /* Custom checkbox — the satisfying tick */
    .runcheck{
      position:relative;
      width:28px; height:28px;
      border-radius:50%;
      border:1.5px solid rgba(241,232,210,0.28);
      background:rgba(241,232,210,0.04);
      flex-shrink:0;
      display:grid; place-items:center;
      transition:transform .18s cubic-bezier(.34,1.56,.64,1), background .25s, border-color .25s, box-shadow .25s;
    }
    .runcheck:hover{
      border-color:var(--amber);
      transform:scale(1.06);
    }
    .runcheck:active{ transform:scale(.92); }
    .runcheck svg{
      width:14px; height:14px;
      stroke:var(--ink); stroke-width:3; fill:none;
      stroke-linecap:round; stroke-linejoin:round;
      stroke-dasharray:20; stroke-dashoffset:20;
      transition:stroke-dashoffset .35s cubic-bezier(.34,1.56,.64,1) .05s;
    }
    .runcheck.is-done{
      background:var(--amber);
      border-color:var(--amber);
      box-shadow:0 0 0 5px var(--amber-tint), 0 8px 24px -4px var(--amber);
    }
    .runcheck.is-done svg{ stroke-dashoffset:0; }
    .runcheck.is-done::after{
      content:"";
      position:absolute; inset:-6px;
      border-radius:50%;
      border:2px solid var(--amber);
      opacity:0;
      animation:ringPulse .55s ease-out;
    }
    @keyframes ringPulse{
      0%{ transform:scale(.6); opacity:0.6; }
      100%{ transform:scale(1.25); opacity:0; }
    }

    /* Hero number tabular alignment */
    .data-num{
      font-family:'Space Grotesk','Plus Jakarta Sans', sans-serif;
      font-feature-settings:'tnum','lnum';
      letter-spacing:-0.04em;
      line-height:0.9;
    }
    .data-num-tight{
      font-family:'Space Grotesk','Plus Jakarta Sans', sans-serif;
      font-feature-settings:'tnum','lnum';
      letter-spacing:-0.02em;
    }
    .serif{ font-family:'DM Serif Display', Georgia, serif; font-weight:400; }
    .serif-i{ font-family:'DM Serif Display', Georgia, serif; font-style:italic; font-weight:400; }
    .mono-cap{
      font-family:'Plus Jakarta Sans', sans-serif;
      font-weight:700;
      letter-spacing:0.20em;
      text-transform:uppercase;
      font-size:10px;
    }

    /* Phase pip & chips */
    .chip{
      display:inline-flex; align-items:center; gap:6px;
      padding:3px 9px;
      border-radius:999px;
      font-family:'Plus Jakarta Sans', sans-serif;
      font-size:10.5px; font-weight:600;
      letter-spacing:0.04em;
      background:rgba(241,232,210,0.06);
      border:1px solid rgba(241,232,210,0.10);
      color:var(--paper-mute);
      white-space:nowrap;
    }
    .chip .pip{ width:7px; height:7px; border-radius:50%; }
    .chip-amber{ color:var(--amber-hot); background:rgba(245,160,40,0.14); border-color:rgba(245,160,40,0.45); }
    .chip-sage { color:#7EE07A; background:rgba(94,201,90,0.12); border-color:rgba(94,201,90,0.42); }
    .chip-rust { color:#FF8060; background:rgba(255,90,53,0.12); border-color:rgba(255,90,53,0.42); }

    /* Pulsing today dot */
    .live{ position:relative; }
    .live::after{
      content:""; position:absolute; right:-10px; top:50%;
      width:6px; height:6px; border-radius:50%;
      background:var(--amber);
      box-shadow:0 0 0 0 var(--amber);
      transform:translateY(-50%);
      animation:pulse 1.8s ease-out infinite;
    }
    @keyframes pulse{
      0%  { box-shadow:0 0 0 0 rgba(245,160,40,0.85); }
      70% { box-shadow:0 0 0 10px rgba(245,160,40,0); }
      100%{ box-shadow:0 0 0 0 rgba(245,160,40,0); }
    }

    /* Card base */
    .card{
      background:linear-gradient(180deg, rgba(241,232,210,0.04), rgba(241,232,210,0.015));
      border:1px solid var(--line);
      border-radius:14px;
      box-shadow:var(--shadow-warm);
    }
    .card-warm{
      background:linear-gradient(180deg, rgba(229,152,73,0.10), rgba(229,152,73,0.03));
      border:1px solid var(--line-warm);
      box-shadow:0 12px 32px -18px rgba(229,152,73,0.5), 0 1px 0 rgba(0,0,0,0.4);
    }

    textarea.note{
      width:100%;
      background:rgba(12,20,28,0.55);
      border:1px solid var(--line);
      border-radius:10px;
      padding:10px 12px;
      color:var(--paper);
      font-size:13px;
      line-height:1.55;
      resize:none;
      height:72px;
      outline:none;
    }
    textarea.note:focus{ border-color:var(--amber); }

    .btn{
      display:inline-flex; align-items:center; gap:6px;
      padding:8px 14px;
      border-radius:999px;
      border:1px solid var(--line);
      background:rgba(241,232,210,0.05);
      color:var(--paper);
      font-size:12px; font-weight:600;
      letter-spacing:0.02em;
      transition:all .18s ease;
    }
    .btn:hover{ background:rgba(241,232,210,0.1); border-color:rgba(241,232,210,0.22); }
    .btn-amber{
      background:var(--amber); color:var(--ink); border-color:var(--amber);
      box-shadow:0 8px 24px -10px var(--amber);
    }
    .btn-amber:hover{ background:var(--amber-hot); border-color:var(--amber-hot); }
    .btn-ghost{ background:transparent; }

    .divider-warm{ height:1px; background:linear-gradient(90deg, transparent, var(--line-warm), transparent); }

    /* Stat ticks under hero progress */
    .ticks{
      display:grid;
      grid-template-columns:repeat(19,1fr);
      gap:2px;
      height:6px;
    }
    .ticks div{
      background:rgba(241,232,210,0.10);
      border-radius:1px;
      transition:background .3s;
    }

    /* Animations on tab change */
    .fade-in{ animation:fadeUp .35s ease-out; }
    @keyframes fadeUp{ from{ opacity:0; transform:translateY(6px); } to{ opacity:1; transform:none; } }
    @keyframes spin{ to{ transform:rotate(360deg); } }
    @keyframes bob{
      0%,100%{ transform:translateY(0); opacity:0.35; }
      50%{ transform:translateY(-4px); opacity:1; }
    }

    @media (min-width:720px){
      .container{ max-width:760px; margin:0 auto; }
    }
  </style>
</head>

/* ───────── DATES ───────── */
const WEEK1_START = new Date("2026-05-25");
const RACE_DATE   = new Date("2026-10-04");
const TODAY       = new Date();
TODAY.setHours(0,0,0,0);
const DTR = Math.max(0, Math.floor((RACE_DATE - TODAY) / 86400000));
const STORAGE_PREFIX = "hm2025_";

function runDate(week, day){
  const off = { Mon:0, Tue:1, Wed:2, Thu:3, Fri:4, Sat:5, Sun:6 };
  const d = new Date(WEEK1_START);
  d.setDate(d.getDate() + (week-1)*7 + (off[day] ?? 0));
  return d;
}
function fmt(d){ return new Date(d).toLocaleDateString("en-GB",{ day:"numeric", month:"short" }); }
function fmtLong(d){ return new Date(d).toLocaleDateString("en-GB",{ weekday:"long", day:"numeric", month:"long" }); }
function weekRange(weekNum){
  const s = new Date(WEEK1_START); s.setDate(s.getDate() + (weekNum-1)*7);
  const e = new Date(s); e.setDate(s.getDate() + 6);
  const sameMonth = s.getMonth() === e.getMonth();
  const sd = s.toLocaleDateString("en-GB",{day:"numeric"});
  const ed = e.toLocaleDateString("en-GB",{day:"numeric", month:"short"});
  return sameMonth ? `${sd}–${ed}` : `${s.toLocaleDateString("en-GB",{day:"numeric",month:"short"})} – ${ed}`;
}
function isToday(d){ const x=new Date(d); x.setHours(0,0,0,0); return x.getTime()===TODAY.getTime(); }
function isPast(d){ const x=new Date(d); x.setHours(0,0,0,0); return x.getTime()<TODAY.getTime(); }

function watchCfg(i, t){
  if (!i || !t) return null;
  if (/race|rest/i.test(i) || i.startsWith("Race-pace") || i.startsWith("5K TUNE")) return null;
  const parseSecs = s => { const m=s.match(/(\d+)\s*min/); if(m) return +m[1]*60; const x=s.match(/(\d+)\s*s/); return x?+x[1]:null; };
  const slash = i.indexOf("/");
  if (slash < 0) return null;
  const run = parseSecs(i.slice(0, slash));
  const walk = parseSecs(i.slice(slash + 1));
  if (!run || !walk) return null;
  const tm = t.match(/~?(\d+)\s*min/);
  if (!tm) return null;
  const hasFinisher = i.includes("finisher");
  /* finisher sessions: last ~15% of session is open continuous run — subtract before counting sets */
  const totalSecs = +tm[1] * 60 * (hasFinisher ? 0.82 : 1);
  const sets = Math.round(totalSecs / (run+walk));
  const fmt = s => `${Math.floor(s/60)}:${String(s%60).padStart(2,"0")}`;
  return { run: fmt(run), walk: fmt(walk), sets, approx: hasFinisher };
}

                fontSize:"clamp(28px, 6.5vw, 38px)", color:"var(--bone)", marginTop:8, lineHeight:1
              }}>{today.label}</h3>
            </div>
            <span className="chip chip-amber">{typeStyles[today.type]?.tag || "ACTIVITY"}</span>
          </div>
          <p style={{fontSize:14, color:"var(--paper-mute)", marginTop:12, lineHeight:1.55, maxWidth:520}}>
            {today.detail}
          </p>
        </div>
      )}

      <div className="mono-cap" style={{color:"var(--paper-faint)", marginBottom:10, paddingLeft:2}}>
        The rest of the week
      </div>

      <div style={{display:"flex", flexDirection:"column", gap:8}}>
        {WEEK_TEMPLATE.map((s,i) => {
          let diff = dowMap[s.day] - TODAY.getDay();
          if (diff<0) diff+=7;
          const d = new Date(TODAY); d.setDate(TODAY.getDate()+diff);
          const isNow = diff===0;
          if (isNow) return null;
          const st = typeStyles[s.type] || {ink:"var(--paper)", bar:"var(--line)", tag:""};
          return (
            <div key={i} className="card grain grain-dark" style={{
              padding:"13px 14px 13px 16px",
              display:"flex", alignItems:"center", gap:14,
              position:"relative", overflow:"hidden"
            }}>
              <div style={{
                position:"absolute", top:8, bottom:8, left:0, width:3,
                background:st.bar, opacity:0.7, borderRadius:"0 2px 2px 0"
              }}/>
              <div style={{flexShrink:0, width:46}}>
                <div className="mono-cap" style={{color:st.ink}}>{s.day}</div>
                <div className="data-num-tight" style={{
                  fontSize:22, color:"var(--paper)", marginTop:2
                }}>{new Date(d).getDate()}</div>
              </div>
              <div style={{flex:1, minWidth:0}}>
                <div style={{
                  fontSize:14.5, fontWeight:600, color:"var(--paper)", letterSpacing:"-0.005em"
                }}>{s.label}</div>
                <div style={{fontSize:12, color:"var(--paper-dim)", marginTop:3, lineHeight:1.45}}>{s.detail}</div>
              </div>
            </div>
          );
        })}
      </div>

      {/* Tune-up race countdown */}
      {(() => {
        const fiveK = new Date("2026-06-14"); fiveK.setHours(0,0,0,0);
        const days = Math.floor((fiveK - TODAY) / 86400000);
        if (days < 0) return null;
        const label = days === 0 ? "TODAY" : days === 1 ? "tomorrow" : `in ${days} days`;
        return (
          <div className="card grain grain-dark" style={{marginTop:18, padding:"14px 18px 14px", borderColor:"rgba(255,128,96,0.32)"}}>
            <div style={{display:"flex", alignItems:"center", justifyContent:"space-between", gap:12}}>
              <div style={{minWidth:0}}>
                <div className="mono-cap" style={{color:"#FF8060"}}>Tune-up race · {label}</div>
                <div style={{fontSize:17, color:"var(--paper)", marginTop:6, fontWeight:600, letterSpacing:"-0.01em"}}>
                  5K · Sunday 14 June
                </div>
                <div style={{fontSize:11.5, color:"var(--paper-dim)", marginTop:3, fontFamily:"'Space Grotesk', sans-serif"}}>
                  04:30 AM start · 45s / 90s intervals · Zone 2
                </div>
              </div>
              <div style={{textAlign:"right", flexShrink:0}}>
                <div className="data-num-tight" style={{fontSize:34, color:"#FF8060", lineHeight:1, textShadow:"0 0 20px rgba(255,128,96,0.3)"}}>
                  {days === 0 ? "🏁" : days}
                </div>
                {days > 0 && <div className="mono-cap" style={{color:"var(--paper-faint)", marginTop:3}}>{days === 1 ? "day" : "days"}</div>}
              </div>
            </div>
          </div>
        );
      })()}

      {/* Race Targets card */}
      <div className="card grain grain-dark" style={{marginTop:14, padding:"18px 18px 16px", borderColor:"rgba(245,160,40,0.34)"}}>
        <div style={{display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:14}}>
          <div className="mono-cap" style={{color:"var(--amber)"}}>Race targets · Berlin 04.10</div>
          <span className="chip chip-amber">21.0975 km</span>
        </div>

        <div style={{display:"grid", gridTemplateColumns:"1fr 1fr", gap:0, borderTop:"1px solid var(--line)", borderBottom:"1px solid var(--line)"}}>
          <div style={{padding:"14px 0 14px 0"}}>
            <div className="mono-cap" style={{color:"var(--paper-faint)"}}>Target</div>
            <div className="data-num" style={{fontSize:"clamp(38px, 9vw, 52px)", color:"var(--paper)", marginTop:4, letterSpacing:"-0.04em"}}>
              2:30
            </div>
            <div style={{fontSize:11.5, color:"var(--paper-dim)", marginTop:3, fontFamily:"'Space Grotesk', sans-serif", letterSpacing:"-0.01em"}}>
              7:05 /km avg
            </div>
          </div>
          <div style={{padding:"14px 0 14px 18px", borderLeft:"1px solid var(--line)"}}>
            <div className="mono-cap" style={{color:"var(--amber)"}}>Stretch</div>
            <div className="data-num" style={{fontSize:"clamp(38px, 9vw, 52px)", color:"var(--amber-hot)", marginTop:4, letterSpacing:"-0.04em", textShadow:"0 0 24px rgba(245,160,40,0.4)"}}>
              2:15
            </div>
            <div style={{fontSize:11.5, color:"var(--paper-dim)", marginTop:3, fontFamily:"'Space Grotesk', sans-serif", letterSpacing:"-0.01em"}}>
              6:25 /km avg
            </div>
          </div>
        </div>

        <div className="serif-i" style={{fontSize:14, color:"var(--paper-mute)", lineHeight:1.7, marginTop:14}}>
          "Open at target pace. At km 12 — if HR is steady and shins are quiet — pick it up toward stretch. Otherwise hold for a safe 2h30."
        </div>
      </div>

      {/* Rules card */}
      <div className="card grain grain-dark" style={{marginTop:14, padding:"18px 18px 14px"}}>
        <div className="mono-cap" style={{color:"var(--amber)"}}>Three rules that override everything</div>
        <div style={{marginTop:14, display:"flex", flexDirection:"column", gap:12}}>
          {[
            {t:"Sharp shin pain mid-run", a:"Stop. Walk home. Two full rest days.", c:"var(--rust)"},
            {t:"HR above 140 bpm",         a:"Walk until 125, then resume.",         c:"var(--amber)"},
            {t:"Boston 12 stays in the box", a:"Until Week 11. No exceptions.",       c:"var(--sage)"},
          ].map((r,i) => (
            <div key={i} style={{display:"flex", gap:14, alignItems:"flex-start"}}>
              <div className="data-num-tight" style={{
                fontSize:24, color:r.c, width:32, lineHeight:1, flexShrink:0
              }}>{String(i+1).padStart(2,"0")}</div>
              <div>
                <div style={{fontSize:14, color:"var(--paper)", fontWeight:600}}>{r.t}</div>
                <div style={{fontSize:12.5, color:"var(--paper-mute)", marginTop:2, lineHeight:1.5}}>{r.a}</div>
              </div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

function SectionHead({title, sub}){
  return (
    <div style={{marginBottom:18, paddingLeft:2}}>
      <h2 className="serif" style={{
        fontSize:"clamp(26px, 6vw, 34px)", color:"var(--bone)", lineHeight:1.05
      }}>{title}</h2>
      {sub && <div style={{
        fontSize:12, color:"var(--paper-dim)", marginTop:4, letterSpacing:"0.02em"
      }}>{sub}</div>}
    </div>
  );
}

/* ───────── RUN PLAN TAB ───────── */
function RunPlanTab({openWeek, setOpenWeek, done, toggleDone, runNotes, editingNote, setEditingNote, noteText, setNoteText, saveNote}){
  return (
    <div className="fade-in" style={{padding:"22px 0 8px"}}>
      <SectionHead title="The plan" sub="Hybrid · Galloway base + strides + continuous + race-pace"/>
      <PhaseLegend/>

      {/* Methods explainer */}
      <details className="card grain grain-dark" style={{marginBottom:14, padding:"14px 16px", borderColor:"rgba(94,201,90,0.28)"}}>
        <summary style={{listStyle:"none", cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"space-between", gap:12}}>
          <div>
            <div className="mono-cap" style={{color:"var(--sage)"}}>The four tools in this plan</div>
            <div style={{fontSize:12.5, color:"var(--paper-dim)", marginTop:4}}>Tap to learn what each session type does</div>
          </div>
          <span style={{color:"var(--paper-faint)", fontSize:11}}>▾</span>
        </summary>
        <div style={{marginTop:14, paddingTop:12, borderTop:"1px solid var(--line)", display:"flex", flexDirection:"column", gap:14}}>
          {[
            {n:"Galloway intervals", c:"#5EC95A", w:"Every run", d:"Run/walk pattern (e.g. 60s run / 90s walk). The chassis of the plan. Walk breaks keep impact low — your shins' best friend. You'll race with these too."},
            {n:"Strides", c:"#B89AC7", w:"After Thu runs (wks 1–18)", d:"4–6 × 15s controlled-fast pickups on flat ground, full recovery between. Too short to stress shins; huge payoff for form, leg turnover, and a faster top gear."},
            {n:"Continuous-run finisher", c:"#4DB8F5", w:"End of Sat long runs (wks 5–17)", d:"After the intervals, drop the walk breaks and run continuous Zone 2. Starts at 5 min, builds to 20 min. Trains your body to run without stopping — the actual unlock for faster finish times."},
            {n:"Race-pace intervals", c:"#F5A028", w:"Tue (wks 10–17)", d:"Short reps at controlled-hard race effort (~6:30–7:00/km), with walk recovery. Teaches your legs the rhythm of race pace so it feels familiar, not new, on race day."},
          ].map((m,i) => (
            <div key={i} style={{display:"flex", gap:14, alignItems:"flex-start"}}>
              <div style={{width:8, height:8, borderRadius:"50%", background:m.c, marginTop:6, flexShrink:0}}/>
              <div style={{flex:1, minWidth:0}}>
                <div style={{display:"flex", alignItems:"baseline", gap:8, flexWrap:"wrap"}}>
                  <span style={{fontSize:14, fontWeight:600, color:"var(--paper)"}}>{m.n}</span>
                  <span style={{fontSize:10.5, color:"var(--paper-faint)", letterSpacing:"0.04em"}}>{m.w}</span>
                </div>
                <div style={{fontSize:12.5, color:"var(--paper-dim)", marginTop:4, lineHeight:1.55}}>{m.d}</div>
              </div>
            </div>
          ))}
        </div>
      </details>

      <div style={{display:"flex", flexDirection:"column", gap:8}}>
        {WEEKS.map(w => {
          const pc = PHASE_COLOR[w.phase] || "#888";
          const isOpen = openWeek === w.w;
          const wStart = new Date(WEEK1_START);
          wStart.setDate(wStart.getDate() + (w.w-1)*7);
          const wEnd = new Date(wStart); wEnd.setDate(wStart.getDate()+7);
          const isCurrent = TODAY >= wStart && TODAY < wEnd;
          const wRuns = w.runs.filter(r => r.i !== "Rest" && !r.i.includes("RACE"));
          const wDone = wRuns.filter(r => done[`${w.w}-${r.d}`]).length;
          const weekKm = w.runs.filter(r => r.km && r.km !== "—")
            .map(r => parseFloat(r.km.replace("~","").replace("km","")) || 0)
            .reduce((a,b) => a+b, 0).toFixed(1);
          const allDone = wDone === wRuns.length && wRuns.length>0;

          return (
            <div key={w.w} className="card grain grain-dark" style={{
              overflow:"hidden",
              borderColor: isCurrent ? "var(--line-warm)" : "var(--line)",
              boxShadow: isCurrent ? "0 12px 32px -18px rgba(229,152,73,0.4), 0 1px 0 rgba(0,0,0,0.4)" : "var(--shadow-warm)"
            }}>
              <button onClick={()=>setOpenWeek(isOpen ? null : w.w)} style={{
                width:"100%", background:"transparent", border:"none",
                padding:"14px 16px", textAlign:"left",
                display:"flex", alignItems:"center", gap:14
              }}>
                <div style={{flexShrink:0, position:"relative"}}>
                  <div className="data-num-tight" style={{
                    fontSize:28, color: isCurrent ? "var(--amber)" : "var(--paper)", lineHeight:1
                  }}>{String(w.w).padStart(2,"0")}</div>
                  <div className="mono-cap" style={{color:"var(--paper-faint)", marginTop:2}}>wk</div>
                </div>
                <div style={{width:1, alignSelf:"stretch", background:"var(--line)"}}/>
                <div style={{flex:1, minWidth:0}}>
                  <div style={{display:"flex", alignItems:"center", gap:8, flexWrap:"wrap"}}>
                    <span style={{fontSize:15, fontWeight:600, color:"var(--paper)"}}>{w.phase}</span>
                    {w.deload && <span className="chip" style={{color:"#D2B58C", borderColor:"rgba(210,181,140,0.3)"}}>DELOAD</span>}
                    {w.tuneup && <span className="chip chip-rust">{w.tuneup}</span>}
                    {isCurrent && <span className="chip chip-amber"><span className="live" style={{display:"inline-block",width:0}}/>NOW</span>}
                    {allDone && <span className="chip chip-sage">✓ done</span>}
                  </div>
                  <div style={{
                    fontSize:11.5, color: isCurrent ? "var(--amber)" : "var(--paper-faint)",
                    marginTop:4, fontVariantNumeric:"tabular-nums",
                    fontFamily:"'Space Grotesk', sans-serif", letterSpacing:"-0.005em"
                  }}>
                    {weekRange(w.w)}
                  </div>
                  <div style={{
                    fontSize:11.5, color:"var(--paper-dim)", marginTop:3,
                    fontVariantNumeric:"tabular-nums"
                  }}>
                    <span style={{color:pc}}>●</span> &nbsp;{wDone}/{wRuns.length} runs · {weekKm} km · {w.shoe}
                  </div>
                </div>
                <div style={{color:"var(--paper-faint)"}}><Chev open={isOpen}/></div>
              </button>

              {isOpen && (
                <div className="fade-in" style={{
                  borderTop:"1px solid var(--line)",
                  padding:"6px 12px 12px",
                  background:"rgba(0,0,0,0.18)"
                }}>
                  {w.runs.map((run,i) => (
                    <RunRow key={i} run={run} w={w}
                      isDone={!!done[`${w.w}-${run.d}`]}
                      toggle={()=>toggleDone(`${w.w}-${run.d}`)}
                      note={runNotes[`${w.w}-${run.d}`]}
                      isEditing={editingNote === `${w.w}-${run.d}`}
                      onEdit={()=>{ setEditingNote(`${w.w}-${run.d}`); setNoteText(runNotes[`${w.w}-${run.d}`] || ""); }}
                      onCancel={()=>setEditingNote(null)}
                      onSave={()=>saveNote(`${w.w}-${run.d}`)}
                      noteText={noteText}
                      setNoteText={setNoteText}
                    />
                  ))}
                </div>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

function RunRow({run, w, isDone, toggle, note, isEditing, onEdit, onCancel, onSave, noteText, setNoteText}){
  const isRest = run.i === "Rest";
  const isRace = run.i.includes("RACE");
  const rd = runDate(w.w, run.d);
  const todayRun = isToday(rd);
  const pastRun = isPast(rd);
  const km = run.km && run.km !== "—" ? run.km.replace("~","") : null;
  const watch = watchCfg(run.i, run.t);

  let statusTag = null;
  if (isRace) statusTag = <span className="chip chip-rust">RACE</span>;
  else if (todayRun && !isDone) statusTag = <span className="chip chip-amber">TODAY</span>;
  else if (isDone) statusTag = <span className="chip chip-sage">DONE</span>;
  else if (pastRun && !isRest) statusTag = <span className="chip" style={{color:"#E89484"}}>MISSED?</span>;

  return (
    <div style={{
      padding:"12px 6px 12px 6px",
      borderBottom:"1px dashed var(--line)",
      display:"flex", gap:14, alignItems:"flex-start",
      opacity: isRest ? 0.55 : 1,
      position:"relative"
    }}>
      {!isRest && !isRace ? (
        <button className={`runcheck ${isDone ? "is-done" : ""}`}
          onClick={toggle}
          aria-label={isDone ? "Mark not done" : "Mark done"}
        >
          <svg viewBox="0 0 24 24"><path d="M5 12l5 5L20 7"/></svg>
        </button>
      ) : (
        <div style={{
          width:28, height:28, flexShrink:0,
          display:"grid", placeItems:"center",
          color: isRace ? "var(--amber)" : "var(--paper-faint)"
        }}>
          {isRace
            ? <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M5 21V4M5 4h12l-2 4 2 4H5"/></svg>
            : <span style={{fontSize:10, letterSpacing:2, fontWeight:600}}>REST</span>
          }
        </div>
      )}

      <div style={{flex:1, minWidth:0}}>
        <div style={{display:"flex", alignItems:"center", gap:8, flexWrap:"wrap"}}>
          <span style={{
            fontSize:11.5, fontWeight:700, letterSpacing:"0.1em",
            color: todayRun ? "var(--amber)" : isDone ? "var(--sage)" : "var(--paper-dim)"
          }}>{run.d.toUpperCase()}</span>
          <span style={{fontSize:11, color:"var(--paper-faint)", fontVariantNumeric:"tabular-nums"}}>
            {fmt(rd)}
          </span>
          {km && <span className="chip" style={{
            color: todayRun ? "var(--amber)" : "var(--paper-mute)",
            borderColor: todayRun ? "rgba(229,152,73,0.3)" : "var(--line)"
          }}>{km}</span>}
          {run.t !== "—" && (
            <span style={{
              marginLeft:"auto",
              fontSize:11, color:"var(--paper-faint)",
              fontVariantNumeric:"tabular-nums"
            }}>{run.t}</span>
          )}
        </div>
        {watch && (
          <div style={{display:"flex", alignItems:"center", gap:5, marginTop:3}}>
            <svg viewBox="0 0 24 24" width="11" height="11" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{color:"var(--paper-faint)", flexShrink:0}}>
              <rect x="5" y="2" width="14" height="20" rx="2"/><path d="M9 1v3M15 1v3M9 20v3M15 20v3"/><circle cx="12" cy="12" r="3"/><path d="M12 9v3l2 2"/>
            </svg>
            <span style={{fontSize:11, color:"var(--paper-faint)", fontFamily:"'Space Grotesk',sans-serif", letterSpacing:"0.01em"}}>
              {watch.approx ? "~" : ""}{watch.sets} sets · {watch.run} run / {watch.walk} walk{watch.approx ? " · then open run" : ""}
            </span>
          </div>
        )}
        <div style={{
          fontSize: isRace ? 18 : 14.5,
          fontFamily: isRace ? "'DM Serif Display', serif" : "inherit",
          fontStyle: isRace ? "italic" : "normal",
          fontWeight: isRace ? 400 : 600,
          color: isRace ? "var(--amber-hot)" : isDone ? "var(--paper)" : "var(--paper)",
          marginTop:5,
          textDecoration: isDone ? "none" : "none"
        }}>{run.i}</div>
        <div style={{display:"flex", alignItems:"center", gap:8, marginTop:5, flexWrap:"wrap"}}>
          {statusTag}
          {!isRest && (
            <span style={{fontSize:10.5, color:"var(--sage)", fontWeight:500, letterSpacing:"0.04em"}}>
              Zone 2 · 115–140 bpm
            </span>
          )}
        </div>
        {run.n && (
          <div style={{
            fontSize:12, color:"var(--paper-dim)", marginTop:7,
            fontStyle:"italic", lineHeight:1.5, fontFamily:"'DM Serif Display', serif",
            fontWeight:400, fontSize:13.5
          }}>{run.n}</div>
        )}

        {isDone && (
          <div style={{marginTop:10, paddingTop:10, borderTop:"1px solid var(--line)"}}>
            {isEditing ? (
              <div>
                <textarea className="note" value={noteText} onChange={e=>setNoteText(e.target.value)}
                  placeholder="How did it go? Shins? HR? Pace?"
                  autoFocus
                />
                <div style={{display:"flex", gap:6, marginTop:8, justifyContent:"flex-end"}}>
                  <button className="btn btn-ghost" onClick={onCancel}>Cancel</button>
                  <button className="btn btn-amber" onClick={onSave}>Save note</button>
                </div>
              </div>
            ) : (
              <button onClick={onEdit} style={{
                background:"transparent", border:"none",
                display:"flex", alignItems:"center", gap:8,
                padding:0, color:"var(--paper-dim)",
                fontSize:12, textAlign:"left", width:"100%"
              }}>
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round" style={{flexShrink:0, color:"var(--amber)"}}>
                  <path d="M12 20h9M16.5 3.5a2.1 2.1 0 113 3L7 19l-4 1 1-4z"/>
                </svg>
                <span style={{
                  fontStyle: note ? "italic" : "normal",
                  fontFamily: note ? "'DM Serif Display',serif" : "inherit",
                  fontSize: note ? 14 : 12,
                  color: note ? "var(--paper-mute)" : "var(--paper-faint)",
                  lineHeight:1.5
                }}>
                  {note || "Add a note about this run…"}
                </span>
              </button>
            )}
          </div>
        )}
      </div>
    </div>
  );
}

/* ───────── TRAINING TAB ───────── */

function DetailBlock({label, color, text}){

/* ───────── LOG BOOK TAB ───────── */
const EMPTY_FORM = {date:"", distance:"", pace:"", hr:"", duration:"", cal:"", effort:"Easy", sessionName:"", note:"", shins:""};

function LogBookTab(){
  const [entries, setEntries] = useState([]);
  const [editingId, setEditingId] = useState(null);
  const [editShins, setEditShins] = useState("");
  const [showForm, setShowForm] = useState(false);
  const [form, setForm] = useState({...EMPTY_FORM, date: TODAY.toISOString().slice(0,10)});

  useEffect(()=>{
    const saved = lsGet("logbook");
    if (saved) try { setEntries(JSON.parse(saved)); } catch {}
  },[]);

  const saveEntry = () => {
    if (!form.date) return;
    const weekNum = (() => {
      const d = new Date(form.date); d.setHours(0,0,0,0);
      for (const w of WEEKS) {
        const s = new Date(WEEK1_START); s.setDate(s.getDate()+(w.w-1)*7);
        const e = new Date(s); e.setDate(s.getDate()+7);
        if (d>=s && d<e) return w.w;
      }
      return 1;
    })();
    const entry = { id: Date.now(), week: weekNum, ...form };
    const next = [...entries, entry];
    setEntries(next);
    lsSet("logbook", JSON.stringify(next));
    setShowForm(false);
    setForm({...EMPTY_FORM, date: TODAY.toISOString().slice(0,10)});
  };

  const deleteEntry = id => {
    const next = entries.filter(e=>e.id!==id);
    setEntries(next);
    lsSet("logbook", JSON.stringify(next));
  };

  const saveShins = id => {
    const next = entries.map(e=>e.id===id?{...e, shins:editShins}:e);
    setEntries(next);
    lsSet("logbook", JSON.stringify(next));
    setEditingId(null);
  };

  const sorted = [...entries].sort((a,b)=>b.id-a.id);
  const totalKm = entries.reduce((s,e)=>s+(parseFloat(e.distance)||0),0).toFixed(1);

  return (
    <div className="fade-in" style={{padding:"22px 0 30px"}}>
      <div style={{display:"flex", alignItems:"flex-end", justifyContent:"space-between", marginBottom:4}}>
        <div>
          <h2 className="serif" style={{fontSize:"clamp(26px,6vw,34px)", color:"var(--bone)", lineHeight:1.05}}>Log Book</h2>
          <div style={{fontSize:12, color:"var(--paper-dim)", marginTop:4}}>
            {entries.length} run{entries.length!==1?"s":""} · {totalKm} km total
          </div>
        </div>
        <button onClick={()=>setShowForm(v=>!v)} className="btn btn-amber" style={{fontSize:12, padding:"8px 14px"}}>
          {showForm ? "Cancel" : "+ Add run"}
        </button>
      </div>

      {showForm && (
        <div className="card grain grain-dark fade-in" style={{marginTop:14, padding:"16px 16px 14px", borderColor:"rgba(94,201,90,0.3)"}}>
          <div className="mono-cap" style={{color:"var(--sage)", marginBottom:14}}>Manual log entry</div>
          <div style={{display:"grid", gridTemplateColumns:"1fr 1fr", gap:10}}>
            {[
              {k:"date",     l:"Date",     type:"date",   ph:""},
              {k:"distance", l:"Distance", type:"text",   ph:"e.g. 3.08"},
              {k:"pace",     l:"Pace /km", type:"text",   ph:"e.g. 7:15"},
              {k:"hr",       l:"Avg HR",   type:"number", ph:"e.g. 113"},
              {k:"duration", l:"Duration", type:"text",   ph:"e.g. 41:56"},
              {k:"cal",      l:"kcal",     type:"number", ph:"e.g. 224"},
            ].map(({k,l,type,ph})=>(
              <div key={k}>
                <div style={{fontSize:10.5, color:"var(--paper-faint)", marginBottom:4, letterSpacing:"0.06em", textTransform:"uppercase", fontFamily:"'Space Grotesk',sans-serif"}}>{l}</div>
                <input type={type} value={form[k]} onChange={e=>setForm(f=>({...f,[k]:e.target.value}))}
                  placeholder={ph}
                  style={{width:"100%", boxSizing:"border-box", background:"rgba(247,240,220,0.05)", border:"1px solid var(--line)",
                    borderRadius:8, color:"var(--paper)", fontSize:13, padding:"7px 10px",
                    fontFamily:"'Space Grotesk',sans-serif", outline:"none"}}/>
              </div>
            ))}
          </div>
          <div style={{marginTop:10}}>
            <div style={{fontSize:10.5, color:"var(--paper-faint)", marginBottom:4, letterSpacing:"0.06em", textTransform:"uppercase", fontFamily:"'Space Grotesk',sans-serif"}}>Effort</div>
            <div style={{display:"flex", gap:6}}>
              {["Easy","Moderate","Hard"].map(e=>(
                <button key={e} onClick={()=>setForm(f=>({...f,effort:e}))} style={{
                  flex:1, padding:"7px 0", borderRadius:8, fontSize:12, fontWeight:600, cursor:"pointer",
                  fontFamily:"'Space Grotesk',sans-serif",
                  background: form.effort===e ? "rgba(94,201,90,0.18)" : "rgba(247,240,220,0.04)",
                  border: form.effort===e ? "1px solid rgba(94,201,90,0.45)" : "1px solid var(--line)",
                  color: form.effort===e ? "var(--sage)" : "var(--paper-faint)"
                }}>{e}</button>
              ))}
            </div>
          </div>
          {[
            {k:"sessionName", l:"Session (e.g. 30s/120s)"},
            {k:"note",        l:"Note"},
            {k:"shins",       l:"Shins"},
          ].map(({k,l})=>(
            <div key={k} style={{marginTop:10}}>
              <div style={{fontSize:10.5, color:"var(--paper-faint)", marginBottom:4, letterSpacing:"0.06em", textTransform:"uppercase", fontFamily:"'Space Grotesk',sans-serif"}}>{l}</div>
              <input value={form[k]} onChange={e=>setForm(f=>({...f,[k]:e.target.value}))}
                placeholder=""
                style={{width:"100%", boxSizing:"border-box", background:"rgba(247,240,220,0.05)", border:"1px solid var(--line)",
                  borderRadius:8, color:"var(--paper)", fontSize:13, padding:"7px 10px",
                  fontFamily:"'Space Grotesk',sans-serif", outline:"none"}}/>
            </div>
          ))}
          <button onClick={saveEntry} className="btn btn-amber" style={{width:"100%", marginTop:14, padding:"10px", fontSize:13}}>
            Save to Log Book
          </button>
        </div>
      )}

      {entries.length === 0 ? (
        <div className="card grain grain-dark fade-in" style={{padding:"22px 18px", marginTop:18, borderColor:"rgba(94,201,90,0.28)", textAlign:"center"}}>
          <div style={{fontSize:28, marginBottom:12}}>📓</div>
          <div className="mono-cap" style={{color:"var(--sage)", marginBottom:8}}>No runs logged yet</div>
          <div style={{fontSize:13.5, color:"var(--paper-dim)", lineHeight:1.65}}>
            After each run, share your Apple Watch screenshots in the <strong style={{color:"var(--paper)"}}>Coach</strong> tab. A "Save to Log Book" button will appear — tap it to record your stats here.
          </div>
        </div>
      ) : (
        <div style={{display:"flex", flexDirection:"column", gap:12, marginTop:18}}>
          {sorted.map(e=>{
            const pc = PHASE_COLOR[WEEKS.find(w=>w.w===e.week)?.phase] || "var(--amber)";
            const isEditing = editingId === e.id;
            return (
              <div key={e.id} className="card grain grain-dark" style={{padding:"16px 16px 14px", borderLeft:`3px solid ${pc}`, borderRadius:"0 12px 12px 0"}}>

                <div style={{display:"flex", alignItems:"flex-start", justifyContent:"space-between", marginBottom:10}}>

                    fontSize:13.5, color:"var(--paper-mute)", lineHeight:1.65,
                    borderTop:"1px solid var(--line)", paddingTop:10, marginBottom:10
                  }}>"{e.note}"</div>
                )}

                {/* Shins note */}
                {!isEditing ? (
                  <div style={{display:"flex", alignItems:"center", gap:8}}>
                    <span style={{fontSize:11.5, color: e.shins ? "var(--paper-dim)" : "var(--paper-faint)", fontStyle: e.shins ? "normal" : "italic"}}>
                      {e.shins || "Shins: tap to note"}
                    </span>
                    <button onClick={()=>{ setEditingId(e.id); setEditShins(e.shins||""); }} style={{
                      background:"none", border:"1px solid var(--line)", borderRadius:6,
                      color:"var(--paper-faint)", fontSize:10.5, padding:"2px 8px", cursor:"pointer",
                      fontFamily:"'Space Grotesk',sans-serif"
                    }}>edit</button>
                  </div>
                ) : (
                  <div style={{display:"flex", gap:6, alignItems:"center"}}>
                    <input
                      value={editShins}
                      onChange={e=>setEditShins(e.target.value)}
                      placeholder="e.g. Left shin fine, mild ache right"
                      autoFocus
                      style={{
                        flex:1, background:"rgba(247,240,220,0.05)", border:"1px solid var(--line-warm)",
                        borderRadius:8, color:"var(--paper)", fontSize:12.5,
                        padding:"7px 10px", fontFamily:"'Space Grotesk',sans-serif", outline:"none"
                      }}
                    />
                    <button onClick={()=>saveShins(e.id)} className="btn btn-amber" style={{fontSize:11, padding:"6px 12px"}}>Save</button>
                    <button onClick={()=>setEditingId(null)} className="btn btn-ghost" style={{fontSize:11}}>✕</button>
                  </div>
                )}
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

/* ───────── COACH TAB ───────── */
function CoachTab(){
  const [messages, setMessages]       = useState([]);
  const [pendingImages, setPendingImages] = useState([]);
  const [inputText, setInputText]     = useState("");
  const [loading, setLoading]         = useState(false);
  const bottomRef = useRef(null);
  const fileRef   = useRef(null);

  const currentWeek = useMemo(()=>{
    for(const w of WEEKS){
      const s=new Date(WEEK1_START); s.setDate(s.getDate()+(w.w-1)*7);
      const e=new Date(s); e.setDate(s.getDate()+7);
      if(TODAY>=s && TODAY<e) return w.w;
    }
    return TODAY<WEEK1_START?1:19;
  },[]);

  /* load saved chat on mount */
  useEffect(()=>{
    const saved = lsGet("coach_msgs");
    if (saved) try { setMessages(JSON.parse(saved)); } catch {}
  }, []);

  /* persist chat on every change — strip base64 to stay under localStorage limit */
  useEffect(()=>{
    if (messages.length === 0) return;
    const stripped = messages.map(m=>({
      ...m,
      images: [],
      hasImages: (m.images||[]).length > 0
    }));
    lsSet("coach_msgs", JSON.stringify(stripped.slice(-60)));
  }, [messages]);

  useEffect(()=>{
    bottomRef.current?.scrollIntoView({behavior:"smooth"});
  },[messages, loading]);

  const addImages = files => {
    Array.from(files).forEach(file=>{
      if(!file.type.startsWith("image/")) return;
      const reader = new FileReader();
      reader.onload = e => {
        const url = e.target.result;
        setPendingImages(prev=>[...prev,{base64:url.split(",")[1], mimeType:file.type, preview:url}]);
      };
      reader.readAsDataURL(file);
    });
  };

  const send = async()=>{
    if(!inputText.trim() && pendingImages.length===0) return;
    const userMsg = {role:"user", text:inputText.trim(), images:[...pendingImages]};
    const next = [...messages, userMsg];
    setMessages(next);
    setInputText(""); setPendingImages([]); setLoading(true);

    const system = `You are a warm, direct running coach for a complete beginner training for the Berlin Half Marathon, Sunday October 4 2026. Currently week ${currentWeek}/19.

Tune-up race: 5K on Sunday June 14 2026, 04:30 AM start (week 3 Sunday).

Plan is a hybrid: Galloway run/walk intervals as the base/chassis, plus three layered tools — strides (4–6 × 15s pickups after Thursday runs), continuous-run finishers (drop walk breaks for the final X minutes of Saturday long runs, building 5→20 min through the plan), and race-pace intervals on Tuesdays in weeks 10–17. Race-day intervals will be 60s run / 30s walk; goal pace 7:05/km for 2h30, stretch 6:25/km for 2h15.

Athlete background: occasional cardio 2-3x/month, shin splint risk (highest priority to protect), cross-trains with spinning (Fri Beat81), gym (Mon), yoga/Bollywood/Hyrox (Sun), German class (Wed). Wears Apple Watch, based in Berlin.

Athlete's stated priorities, in order: stay healthy, enjoy the process, learn something new this year, finish the half marathon standing tall. Time goals are secondary to those.

When they share screenshots: carefully read every metric visible, describe what you see, then ask one follow-up about how the session felt.
When they describe feelings: give specific, honest feedback referencing their actual numbers. If the data looks concerning (HR too high, HRV dropping, poor sleep), flag it directly.
If the plan needs adjusting: suggest a concrete change (e.g. "skip strides this Thursday, save the legs"). Don't push them toward 2h15 if their body is telling them otherwise.
Style: coach texting a friend — short paragraphs, warm but direct, never generic.

IMPORTANT — Log Book integration: When the user shares a workout screenshot and you can read the metrics, append this block EXACTLY at the very end of your response with no text after it:
<log>{"distance":"X.XX","pace":"M:SS","hr":NNN,"duration":"H:MM:SS","cal":NNN,"effort":"Easy","sessionName":"interval format e.g. 30s/120s","note":"One coaching sentence max 12 words"}</log>
Only include fields visible in the screenshots. Omit any field you cannot read. If no workout data is visible, omit the block entirely.`;

    const contents = next.slice(-12).map(msg=>({
      role: msg.role==="ai"?"model":"user",
      parts:[
        ...(msg.images||[]).map(img=>({inlineData:{mimeType:img.mimeType, data:img.base64}})),
        ...(msg.text?[{text:msg.text}]:[])
      ].filter(p=>p.text!==undefined||p.inlineData)
    }));

    try{
      const res = await fetch(
        `https://marathon-coach.onrender.com/coach`,
        {method:"POST", headers:{"Content-Type":"application/json"},
          body:JSON.stringify({
            systemInstruction:{parts:[{text:system}]},
            contents,
            generationConfig:{temperature:0.75, maxOutputTokens:650}
          })
        }
      );
      const data = await res.json();
      if (!res.ok || data.error) {
        const msg = data.error?.message || `HTTP ${res.status}`;
        setMessages(prev=>[...prev,{role:"ai", text:`API error: ${msg}`}]);
        return;
      }
      const cand = data.candidates?.[0];
      const rawText = cand?.content?.parts?.map(p=>p.text).filter(Boolean).join("\n");
      if (rawText) {
        const logMatch = rawText.match(/<log>([\s\S]*?)<\/log>/);
        let logData = null;
        let text = rawText;
        if (logMatch) {
          text = rawText.replace(/<log>[\s\S]*?<\/log>/, "").trim();
          try { logData = JSON.parse(logMatch[1]); } catch {}
        }
        setMessages(prev=>[...prev,{role:"ai", text, logData, logSaved:false}]);
      } else if (cand?.finishReason && cand.finishReason !== "STOP") {
        setMessages(prev=>[...prev,{role:"ai", text:`Response blocked (${cand.finishReason}). Try rephrasing or a different screenshot.`}]);
      } else {
        setMessages(prev=>[...prev,{role:"ai", text:"Empty response from model. Try again?"}]);
      }
    }catch(e){
      setMessages(prev=>[...prev,{role:"ai", text:`Connection issue: ${e.message}`}]);
    }finally{ setLoading(false); }
  };

  const handleKey = e=>{ if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send();} };
  const canSend = !loading && (inputText.trim().length>0 || pendingImages.length>0);

  const saveToLog = (msgIdx, logData) => {
    const entry = {
      id: Date.now(),
      date: TODAY.toISOString().slice(0,10),
      week: currentWeek,
      shins: "",
      ...logData
    };
    const existing = JSON.parse(lsGet("logbook") || "[]");
    existing.push(entry);
    lsSet("logbook", JSON.stringify(existing));
    setMessages(prev => prev.map((m,i) => i===msgIdx ? {...m, logSaved:true} : m));
  };

  const AiAvatar = ()=>(
    <div style={{
      width:28,height:28,borderRadius:"50%",flexShrink:0,
      background:"rgba(94,201,90,0.14)",border:"1px solid rgba(94,201,90,0.38)",
      display:"grid",placeItems:"center",color:"var(--sage)",marginBottom:2
    }}>
      <svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
        <circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
      </svg>
    </div>
  );

  return (
    <div className="fade-in" style={{paddingTop:22, paddingBottom:30}}>
      {/* Header */}
      <div style={{display:"flex", justifyContent:"space-between", alignItems:"flex-end", marginBottom:18}}>
        <div>
          <h2 className="serif" style={{fontSize:"clamp(26px,6vw,34px)", color:"var(--bone)", lineHeight:1.05}}>AI Coach</h2>
          <div style={{fontSize:12, color:"var(--paper-dim)", marginTop:4}}>Gemini Flash · Week {currentWeek} of 19</div>
        </div>
        {messages.length>0 && (
          <button onClick={()=>{ setMessages([]); lsSet("coach_msgs","[]"); }} className="btn btn-ghost" style={{fontSize:11, color:"var(--paper-faint)"}}>
            Clear
          </button>
        )}
      </div>

      {/* Empty state */}
      {messages.length===0 && (
        <div className="card grain grain-dark fade-in" style={{padding:"18px 18px 16px", marginBottom:18, borderColor:"rgba(94,201,90,0.35)"}}>
          <div className="mono-cap" style={{color:"var(--sage)", marginBottom:10}}>How to use</div>
          <div className="serif-i" style={{fontSize:15, color:"var(--paper-mute)", lineHeight:1.75, marginBottom:12}}>
            "Share an Apple Watch screenshot after your run and I'll read your stats, ask how it felt, and flag anything we should change in the plan."
          </div>
          <div style={{display:"flex", flexDirection:"column", gap:8}}>
            {[
              "Tap 📷 → pick your Workout or Heart Rate screenshot",

              <div key={i} style={{display:"flex", gap:10, alignItems:"flex-start"}}>

                <div style={{fontSize:13, color:"var(--paper-dim)", lineHeight:1.5}}>{t}</div>
              </div>

          </div>

      )}

      {/* Messages */}
      <div style={{display:"flex", flexDirection:"column", gap:12, marginBottom:16}}>
        {messages.map((msg,i)=>(
          <div key={i} style={{
            display:"flex", gap:8, alignItems:"flex-end",
            flexDirection:msg.role==="ai"?"row":"row-reverse"
          }}>
            {msg.role==="ai" && <AiAvatar/>}
            <div style={{
              maxWidth:"84%",
              background:msg.role==="ai"
                ?"linear-gradient(160deg,rgba(247,240,220,0.055),rgba(247,240,220,0.018))"
                :"linear-gradient(160deg,rgba(245,160,40,0.16),rgba(245,160,40,0.07))",
              border:msg.role==="ai"?"1px solid var(--line)":"1px solid rgba(245,160,40,0.40)",
              borderRadius:msg.role==="ai"?"4px 14px 14px 14px":"14px 4px 14px 14px",

                  {msg.images.map((img,ii)=>(

              {msg.hasImages && (msg.images||[]).length===0 && (

        </button>
        <input ref={fileRef} type="file" accept="image/*" multiple style={{display:"none"}}

        <textarea className="note" value={inputText}

      </div>
    </div>
  );

Analyse the health data below and respond in exactly this structure:

Apple Watch data:
${input}`;

    // Load localStorage immediately for instant first paint
    const d = lsGet("done");      if (d) try { setDone(JSON.parse(d)); } catch {}
    const n = lsGet("notes");     if (n) try { setRunNotes(JSON.parse(n)); } catch {}
    const p = lsGet("practice");  if (p === "true") setPracticeDone(true);

    // Subscribe to Firebase — keeps all devices in sync
    const handler = fbRef.on('value', snap => {
      const r = snap.val();
      if (!r) return;
      if (r.done     != null) { setDone(r.done);           lsSet("done",     JSON.stringify(r.done)); }
      if (r.notes    != null) { setRunNotes(r.notes);       lsSet("notes",    JSON.stringify(r.notes)); }
      if (r.practice != null) { setPracticeDone(!!r.practice); lsSet("practice", String(r.practice)); }
    }, ()=>{}); // silent on network error — localStorage still works

    return () => fbRef.off('value', handler);
  },[]);

  const persist = (newDone, newNotes) => {
    lsSet("done", JSON.stringify(newDone));
    lsSet("notes", JSON.stringify(newNotes));
    fbRef.update({ done: newDone, notes: newNotes }).catch(()=>{});
    setSaved(true);
    setTimeout(()=>setSaved(false), 1500);
  };

  const toggleDone = (key) => {
    const nd = {...done, [key]: !done[key]};
    setDone(nd); persist(nd, runNotes);
  };

  const saveNote = (key) => {
    const nn = {...runNotes, [key]: noteText};
    setRunNotes(nn); persist(done, nn);
    setEditingNote(null); setNoteText("");
  };

  const togglePractice = () => {
    const v = !practiceDone;
    setPracticeDone(v);
    lsSet("practice", String(v));
    fbRef.update({ practice: v }).catch(()=>{});
  };

  const totalRuns = useMemo(() => WEEKS.reduce((a,w) =>
    a + w.runs.filter(r => r.i !== "Rest" && !r.i.includes("RACE")).length, 0), []);
  const doneCount = Object.values(done).filter(Boolean).length;
  const pct = Math.round((doneCount/totalRuns) * 100);

  /* current week index */
  const currentWeek = useMemo(() => {
    for (const w of WEEKS) {
      const s = new Date(WEEK1_START); s.setDate(s.getDate() + (w.w-1)*7);
      const e = new Date(s); e.setDate(s.getDate()+7);
      if (TODAY >= s && TODAY < e) return w.w;
    }
    return TODAY < WEEK1_START ? 1 : 19;
  }, []);

  /* keep openWeek synced to current week on first mount */
  useEffect(() => { setOpenWeek(currentWeek); }, [currentWeek]);

  return (
    <div style={{minHeight:"100vh", paddingBottom:60}}>
      <Hero
        doneCount={doneCount}
        totalRuns={totalRuns}
        pct={pct}
        currentWeek={currentWeek}
        saved={saved}
      />
      <PracticeBanner done={practiceDone} onToggle={togglePractice}/>
      <TabBar tab={tab} setTab={setTab}/>

      <main className="container" style={{padding:"0 16px"}}>
        {tab === "week"   && <MyWeekTab/>}
        {tab === "plan"   && <RunPlanTab
            openWeek={openWeek} setOpenWeek={setOpenWeek}
            done={done} toggleDone={toggleDone}
            runNotes={runNotes}
            editingNote={editingNote} setEditingNote={setEditingNote}
            noteText={noteText} setNoteText={setNoteText}
            saveNote={saveNote}
          />}
        {tab === "cross"  && <TrainingTab openCross={openCross} setOpenCross={setOpenCross}/>}
        {tab === "diet"   && <DietTab openDiet={openDiet} setOpenDiet={setOpenDiet}/>}
        {tab === "prehab" && <PrehabTab/>}
        {tab === "log"    && <LogBookTab/>}
        {tab === "coach"  && <CoachTab/>}
      </main>

      <footer style={{
        padding:"30px 20px 24px", textAlign:"center",
        color:"var(--paper-faint)", fontSize:11, letterSpacing:"0.04em"
      }}>
        <div className="serif-i" style={{fontSize:18, color:"var(--paper-dim)", marginBottom:4}}>
          One run at a time.
        </div>
        21.0975 km · Berlin · 04.10.2026
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
